name: CI

on:
  push:
    branches: [main]
  pull_request:

# Solo lee el repo (checkout) y no escribe en ningun sitio: least privilege.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    # Postgres con pgvector para los tests de integracion (*.integration.test.ts):
    # sin el, ninguna consulta SQL real se comprueba nunca. Los tests se saltan
    # solos si TEST_DATABASE_URL no esta definida, asi que en local siguen
    # funcionando sin base de datos; aqui esta siempre.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docsera
          POSTGRES_PASSWORD: docsera
          POSTGRES_DB: docsera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://docsera:docsera@localhost:5432/docsera_test

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Lee la version de pnpm del campo packageManager del package.json raiz
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build
