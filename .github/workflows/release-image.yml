# Publica la imagen del server en GHCR en cada tag vX.Y.Z. Es la imagen que
# consume la CLI (`npx docsera`): su docker-compose generado hace `image:` de
# ghcr.io/<owner>/docsera:<version> en vez de compilar el monorepo en la
# maquina del usuario.
name: release-image

on:
  push:
    tags:
      - "v*"
  # Lanzable a mano desde Actions para publicar la version actual de main sin
  # esperar a un tag (p.ej. la primera publicacion de una version ya taggeada).
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # arm64 se construye emulado con QEMU: lento, pero solo corre en
      # releases y evita mantener un runner arm.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # La version sale del package.json raiz (unica fuente, igual que en los
      # releases), asi el mismo job vale para el push de tag y para el dispatch.
      - id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Provenance ya la añade solo build-push-action al publicar en un
          # registro público; el SBOM (lista de paquetes/versiones de la
          # imagen) no es automático, hay que pedirlo.
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docsera:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/docsera:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-only
          cache-from: type=gha
          cache-to: type=gha,mode=max
