name: Feature request
description: An idea or capability you'd like to see
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Context on why it's needed, not just the solution you have in mind.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How you imagine it would work.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Is there a way to achieve this with what already exists?
    validations:
      required: false
