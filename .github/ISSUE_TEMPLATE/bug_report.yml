name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem. If there's an error message, paste it verbatim.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ingested with `POST /ingest` type "sitemap"
        2. Asked "..." in the widget
        3. The answer was X, expected Y
    validations:
      required: true

  - type: input
    id: llm-provider
    attributes:
      label: LLM_PROVIDER / EMBEDDING_PROVIDER
      placeholder: "e.g. anthropic / openai"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. v0.1.0, or the commit hash"
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker Compose (docker compose up)
        - Local development (pnpm dev, no Docker)
        - Other
    validations:
      required: false
