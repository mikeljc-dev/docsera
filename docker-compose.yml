# db + server levantan el backend completo con un solo comando (`pnpm up` o
# `docker compose up -d --build`). El dashboard se anadira en Fase 2.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: askdocs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: askdocs
      POSTGRES_PASSWORD: askdocs
      POSTGRES_DB: askdocs
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askdocs"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: askdocs-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Dentro de la red de Docker, "localhost" es el propio contenedor: el
      # resto de valores de .env (pensados para `pnpm dev` en el host) no
      # sirven aqui, hay que sobreescribirlos apuntando a los nombres de
      # servicio / al host real.
      DATABASE_URL: postgresql://askdocs:askdocs@db:5432/askdocs
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      # host.docker.internal solo existe por defecto en Docker Desktop
      # (Mac/Windows); esto lo hace funcionar tambien en Linux.
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
