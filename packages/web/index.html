<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Docsera — AI chat for your docs. Open source & self-hosted.</title>
  <meta name="description" content="Add an AI assistant to your documentation with one script tag. Self-hosted, privacy-first, works with Anthropic, OpenAI or local models via Ollama. Every answer cites its sources." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <meta property="og:title" content="Docsera — AI chat for your docs" />
  <meta property="og:description" content="Open source, self-hosted AI assistant for your documentation. One script tag. Every answer cites its sources." />
  <meta property="og:url" content="https://docsera.dev" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://docsera.dev/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://docsera.dev/og.png" />
  <script>
    // Antes del primer pintado: aplica el tema elegido si lo hay
    try { var t = localStorage.getItem("docsera-theme"); if (t) document.documentElement.dataset.theme = t; } catch (e) {}
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script src="https://api.docsera.dev/widget.js" data-server="https://api.docsera.dev"></script>
</body>
</html>
